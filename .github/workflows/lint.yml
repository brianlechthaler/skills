name: Lint

on:
  push:
    branches: [main]
    paths:
      - install.py
      - tests/**
      - pyproject.toml
      - Dockerfile
      - .github/workflows/**
  pull_request:
    branches: [main]
    paths:
      - install.py
      - tests/**
      - pyproject.toml
      - Dockerfile
      - .github/workflows/**
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ruff
      - run: ruff check install.py tests/
      - run: ruff format --check install.py tests/
