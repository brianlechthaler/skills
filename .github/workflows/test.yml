name: Test

on:
  push:
    branches: [main]
    paths:
      - install.py
      - skill_categories.py
      - skill_validate.py
      - scripts/**
      - tests/**
      - pyproject.toml
      - README.md
      - Dockerfile
      - "**/SKILL.md"
      - .github/workflows/**
  pull_request:
    branches: [main]
    paths:
      - install.py
      - skill_categories.py
      - skill_validate.py
      - scripts/**
      - tests/**
      - pyproject.toml
      - README.md
      - Dockerfile
      - "**/SKILL.md"
      - .github/workflows/**
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - run: pip install pytest pytest-cov
      - run: pytest
      - run: python scripts/sync_readme_skill_count.py --check
